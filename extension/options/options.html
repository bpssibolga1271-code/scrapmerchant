<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SE Merchant Scraper — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>SE Merchant Scraper</h1>
      <p>Pengaturan</p>
    </header>

    <!-- API Configuration -->
    <section class="section">
      <h2 class="section__title">Konfigurasi API</h2>

      <div class="form-group">
        <label for="input-api-url">API URL</label>
        <input
          type="url"
          id="input-api-url"
          placeholder="https://example.com/api/merchants"
        >
        <p class="form-group__hint">
          URL endpoint untuk mengirim data merchant yang sudah di-scrape.
        </p>
      </div>

      <div class="button-row">
        <button class="btn btn--secondary" id="btn-test-connection">
          Test Connection
        </button>
        <button class="btn btn--primary" id="btn-save">
          Simpan
        </button>
      </div>

      <p class="status-message hidden" id="status-message"></p>
    </section>

    <!-- Data Management -->
    <section class="section">
      <h2 class="section__title">Manajemen Data</h2>

      <div class="button-row">
        <button class="btn btn--danger" id="btn-clear-regions">
          Hapus Cache Wilayah
        </button>
        <button class="btn btn--danger" id="btn-clear-data">
          Hapus Data Scraping
        </button>
      </div>
    </section>
  </div>

  <script src="../lib/constants.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
